<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Javascript</title>
  </head>
  <body>
    <h1>Task5</h1>
    <p id="target"></p>
    <script>
      "use strict";
      const year = prompt("Enter a year:");

      if (year === null) {
        document.getElementById("target").textContent = "Not a valid number.";
      } else {
        const y = parseInt(year);
        const isLeapYear = y % 400 === 0 || (y % 100 !== 0 && y % 4 === 0);
        document.getElementById("target").textContent =
          `${y} is ${isLeapYear ? "a leap year" : "not a leap year"}.`; // ${isLeapYear ? asks if its true or false. <<-- -->>
      }
    </script>
  </body>
</html>
