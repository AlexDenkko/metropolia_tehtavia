<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Module 4 task 1</title>
  </head>
  <body>
    <h1>Javascript Module 4 task 3</h1>
    <form>
      <input id="query" name="q" type="text" />
      <input type="submit" value="Search" />
    </form>
    <script>
      const form = document.querySelector("form");
      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const query = document.getElementById("query").value;
          try {
            const response = await fetch(
              `https://api.tvmaze.com/search/shows?q=${query}`,
            );
            const data = await response.json();
            console.log(data);

            // Näyttää tulookset sivulla
            let resultsDiv = document.getElementById("results");
            if (!resultsDiv) {
              resultsDiv = document.createElement("div");
              resultsDiv.id = "results";
              form.insertAdjacentElement("afterend", resultsDiv);
            }
            resultsDiv.innerHTML = "";
            data.forEach((tvShow) => {
              const article = document.createElement("article");
              const h2 = document.createElement("h2");
              h2.textContent = tvShow.show.name;
              article.appendChild(h2);
              const link = document.createElement("a");
              link.href = tvShow.show.url;
              link.target = "_blank";
              link.textContent = "View Details";
              article.appendChild(link);
              if (tvShow.show.image?.medium) {
                const img = document.createElement("img");
                img.src = tvShow.show.image.medium;
                img.alt = tvShow.show.name;
                article.appendChild(img);
              }
              const summaryDiv = document.createElement("div");
              summaryDiv.innerHTML = tvShow.show.summary;
              article.appendChild(summaryDiv);
              resultsDiv.appendChild(article);
            });
          } catch (error) {
            console.error("Error fetching data:", error);
          }
        });
      } else {
        console.error("Form not found!");
      }
    </script>
  </body>
</html>
